<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Banca Brasileira - Palpites</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b7a33">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef7ee;color:#173d17}
header{background:#0b7a33;color:#fff;padding:16px;text-align:center;position:sticky;top:0}
#data-hora{margin-top:8px;font-size:.9rem}main{padding:14px;max-width:900px;margin:auto}
.loading,.erro,.card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.12);margin-bottom:14px}
.top-card{display:flex;justify-content:space-between;font-weight:bold;color:#0b7a33}
.lista-milhares{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin:10px 0}
.milhar-card{border:1px solid #b7dcbf;border-radius:10px;padding:8px;text-align:center}
.milhar-numero{font-size:22px;font-weight:bold}.botoes{display:flex;gap:8px}
button{flex:1;background:#0b7a33;color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer;font-weight:bold}
footer{background:#0b7a33;padding:10px;display:flex;justify-content:space-around;position:sticky;bottom:0}
footer button{max-width:120px}
.btn-jogar{background:linear-gradient(45deg,#ffcc00,#ff6a00);animation:pulsar 1s infinite}
@keyframes pulsar{50%{transform:scale(1.08)}}
.mensagem-copy{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#222;color:#fff;padding:12px 18px;border-radius:12px;opacity:0;transition:.3s}
.mensagem-copy.mostrar{opacity:1}
</style></head><body>
<header><h1>PALPITES</h1><h1>🇧🇷 Banca Brasileira</h1><div id="data-hora"></div></header>
<main id="lista-palpite"><div class="loading">Carregando palpites...</div></main>
<footer>
<button>Suporte</button>
<button>Compartilhar</button>
<button id="instalarApp">📥 Download</button>
<button class="btn-jogar" onclick="window.open('https://app.bancabrasileira.com.br/pr/uVZ2pAvP','_blank')">🎰 JOGAR</button>
</footer>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js');}
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;});
document.addEventListener('click',async e=>{
if(e.target.id==='instalarApp'){
if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;}
else alert('Use o menu do navegador e escolha Adicionar à tela inicial.');
}});
const API_URL='https://script.google.com/macros/s/AKfycbz5IvvaLjGuhvBD6xHAwuTsVBA9wEFu2t4rbgpwx4YMc6B-_bhhNY1WwkEAvPfQoogXsw/exec';
const lista=document.getElementById('lista-palpite');
async function carregarPalpites(){try{const r=await fetch(API_URL);const j=await r.json();lista.innerHTML='';
(j.data||[]).forEach(p=>{const c=document.createElement('div');c.className='card';c.innerHTML=`<div class="top-card"><span>🐾 ${p.animal}</span><span>Grupo ${p.grupo}</span></div><div><b>Loteria:</b> ${p.loteria}<br><b>Próximo:</b> ${p.horario}</div><div class="lista-milhares">${p.milhares.map((m,i)=>`<div class="milhar-card"><div class="milhar-numero">${m.milhar}</div><div>${i+1}º<br>Dz ${m.dezena}</div></div>`).join('')}</div><div class="botoes"><button onclick='compartilhar(${JSON.stringify(p)})'>📲 Compartilhar</button><button onclick='copiarMilhar(${JSON.stringify(p)})'>📋 Copiar</button></div>`;lista.appendChild(c);});}catch(e){lista.innerHTML='<div class="erro">Erro ao carregar.</div>';}}
function compartilhar(p){

  const agora = new Date();

  const data = agora.toLocaleDateString('pt-BR');

  const hora = agora.toLocaleTimeString('pt-BR',{
    hour:'2-digit',
    minute:'2-digit'
  });

  const listaMilhares = p.milhares
    .map(m => m.milhar)
    .join('\n');

  const texto = `📅 Data: ${data}

🕒 Horário: ${hora}

🎰 Loteria: ${p.loteria}

⏳ Próxima Extração: ${p.horario}

🐾 Animal: ${p.animal}

🎯 Grupo: ${p.grupo}

🔥 PALPITES
----------------------------------

💎 Milhar:

${listaMilhares}

🍀 Boa sorte!

🌐 palpite.bancabrasileira.site`;

  const url = `https://wa.me/?text=${encodeURIComponent(texto)}`;

  window.open(url,'_blank');

}
function copiarMilhar(p){navigator.clipboard.writeText(p.milhares.map(x=>x.milhar).join(', '));mostrar('Milhares copiadas!')}
function mostrar(t){let d=document.createElement('div');d.className='mensagem-copy';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.classList.add('mostrar'),50);setTimeout(()=>d.remove(),2500);}
function relogio(){document.getElementById('data-hora').textContent='📅 '+new Date().toLocaleString('pt-BR')}
carregarPalpites();relogio();setInterval(relogio,1000);setInterval(carregarPalpites,60000);
</script></body></html>
